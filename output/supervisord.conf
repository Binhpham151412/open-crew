directory=/app/web/standalone
autostart=true
autorestart=true
environment=NODE_ENV="production",PORT="7860",HOSTNAME="0.0.0.0",NEXT_PUBLIC_API_URL="http://localhost:7860/api",PO_URL="http://localhost:8000",PM_URL="http://localhost:8001",BA_URL="http://localhost:8002",SA_URL="http://localhost:8003",FRONTEND_DEV_URL="http://localhost:8004",BACKEND_DEV_URL="http://localhost:8005",UIUX_REVIEWER_URL="http://localhost:8006",SECURITY_REVIEWER_URL="http://localhost:8007",QA_URL="http://localhost:8008",DEVOPS_URL="http://localhost:8009",TECHLEAD_URL="http://localhost:8010",REDIS_URL="redis://localhost:6379/0"
stdout_logfile=/var/log/supervisor/web.log
stderr_logfile=/var/log/supervisor/web-err.log
